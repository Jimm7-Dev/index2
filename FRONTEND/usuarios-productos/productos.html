<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gestión de Productos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tu hoja de estilo personalizada -->
  <link rel="stylesheet" href="styles.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="icon" type="img/jpg" href="/FRONTEND/Xentronix.jpg">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a href="panel.html" class="navbar-brand">
      <h1 class="navbar-brand mb-0">Xentronix</h1>
    </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
           <div style="margin-right: 20px;">
            <a class="nav-link" href="usuarios.html">Usuarios</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="productos.html">Productos</a>
          </div>
             <img src="/FRONTEND/Xentronix.jpg " alt="Xentronix" style="width:50px; height:50px; margin-left:10px;">
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container py-4">
    <h1 class="mb-4" style="color: azure;">Gestión de Productos</h1>

    <!-- Formulario para crear producto -->
    <div class="card mb-4">
      <div class="card-header">
        Crear Nuevo Producto
      </div>
      <div class="card-body">
        <form id="form-crear-producto" onsubmit="crearProducto(); return false;">
          <div class="mb-3">
            <label for="nombre-producto" class="form-label">Nombre:</label>
            <input type="text" class="form-control" id="nombre-producto" required>
          </div>
          <div class="mb-3">
            <label for="descripcion-producto" class="form-label">Descripción:</label>
            <input type="text" class="form-control" id="descripcion-producto">
          </div>
          <div class="mb-3">
            <label for="precio-producto" class="form-label">Precio:</label>
            <input type="number" step="0.01" class="form-control" id="precio-producto" required>
          </div>
          <button type="submit" class="btn btn-primary">Crear</button>
          <a href="panel.html" class="btn btn-secondary">Volver</a>
        </form>
      </div>
    </div>

    <!-- Tabla de productos -->
    <div class="card">
      <div class="card-header">
        Lista de Productos
      </div>
      <div class="card-body p-0">
        <table class="table table-striped mb-0" id="productos-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="productos-body">
            <!-- Aquí se cargarán los productos -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      cargarProductos();
    });

    function cargarProductos() {
      fetch('http://127.0.0.1:5000/productos')
        .then(response => response.json())
        .then(data => {
          const tbody = document.getElementById('productos-body');
          tbody.innerHTML = '';
          data.forEach(producto => {
            // Asumimos que el backend retorna [id, nombre, descripcion, precio]
            tbody.innerHTML += `
              <tr>
                <td>${producto[0]}</td>
                <td>${producto[1]}</td>
                <td>${producto[2]}</td>
                <td>${producto[3]}</td>
                <td>
                  <button class="btn btn-sm btn-warning" onclick="editarProducto(${producto[0]})">Editar</button>
                  <button class="btn btn-sm btn-danger" onclick="eliminarProducto(${producto[0]})">Eliminar</button>
                </td>
              </tr>
            `;
          });
        })
        .catch(error => console.error('Error al cargar productos:', error));
    }

    function crearProducto() {
      const nombre = document.getElementById('nombre-producto').value;
      const descripcion = document.getElementById('descripcion-producto').value;
      const precio = parseFloat(document.getElementById('precio-producto').value);

      const producto = {
        nombre: nombre,
        descripcion: descripcion,
        precio: precio
      };

      fetch('http://127.0.0.1:5000/nuevo_producto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(producto)
      })
      .then(response => response.json())
      .then(data => {
        Swal.fire('Producto creado', data.mensaje, 'success');
        cargarProductos();
        document.getElementById('form-crear-producto').reset();
      })
      .catch(error => console.error('Error al crear producto:', error));
    }

    function editarProducto(id) {
      window.location.href = `producto-edicion.html?id=${id}`;
    }

    function eliminarProducto(id) {
      fetch(`http://127.0.0.1:5000/eliminar_producto/${id}`, {
        method: 'DELETE'
      })
      .then(response => response.json())
      .then(data => {
        Swal.fire('Producto eliminado', data.mensaje, 'success');
        cargarProductos();
      })
      .catch(error => console.error('Error al eliminar producto:', error));
    }
  </script>
</body>
</html>
