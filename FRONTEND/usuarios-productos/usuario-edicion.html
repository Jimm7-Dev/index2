<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Editar Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tu hoja de estilo personalizada -->
  <link rel="stylesheet" href="styles.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Tienda virtual Jimmi</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="usuarios.html">Usuarios</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="productos.html">Productos</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container py-4">
    <h1 class="mb-4">Editar Usuario</h1>
    <div class="card">
      <div class="card-header">Datos del Usuario</div>
      <div class="card-body">
        <form id="form-editar-usuario" onsubmit="actualizarUsuario(); return false;">
          <div class="mb-3">
            <label for="nombre-usuario" class="form-label">Nombre:</label>
            <input type="text" class="form-control" id="nombre-usuario" required>
          </div>
          <div class="mb-3">
            <label for="email-usuario" class="form-label">Email:</label>
            <input type="email" class="form-control" id="email-usuario" required>
          </div>
          <div class="mb-3">
            <label for="password-usuario" class="form-label">Contraseña (nueva):</label>
            <input type="password" class="form-control" id="password-usuario">
          </div>
          <!-- Si usas rol, añade aquí el select -->
          <button type="submit" class="btn btn-primary">Actualizar</button>
          <a href="usuarios.html" class="btn btn-secondary">Volver</a>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Obtener el ID del usuario desde la URL
    const urlParams = new URLSearchParams(window.location.search);
    const usuarioId = urlParams.get('id');

    document.addEventListener('DOMContentLoaded', function() {
      fetch(`http://127.0.0.1:5000/usuario/${usuarioId}`)
        .then(response => response.json())
        .then(usuario => {
          // Asumimos que el backend retorna una tupla, ajusta índices según corresponda
          document.getElementById('nombre-usuario').value = usuario[1];
          document.getElementById('email-usuario').value = usuario[2];
        })
        .catch(error => console.error('Error al cargar usuario:', error));
    });

    function actualizarUsuario() {
      const nombre = document.getElementById('nombre-usuario').value;
      const email = document.getElementById('email-usuario').value;
      const password = document.getElementById('password-usuario').value;

      const usuario = {
        nombre: nombre,
        email: email,
        contrasena: password
      };

      fetch(`http://127.0.0.1:5000/actualizar_usuario/${usuarioId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(usuario)
      })
      .then(response => response.json())
      .then(data => {
        if(data.error){
          Swal.fire('Error', data.error, 'error');
        } else {
          Swal.fire('Actualizado', data.mensaje, 'success');
          window.location.href = 'usuarios.html';
        }
      })
      .catch(error => console.error('Error al actualizar usuario:', error));
    }
  </script>
</body>
</html>
