<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gestión de Usuarios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tu hoja de estilo personalizada -->
  <link rel="stylesheet" href="styles.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a href="panel.html" class="navbar-brand">
      <h1 class="navbar-brand mb-0">Xentronix</h1>
    </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <div style="margin-right: 20px;"> 
            <a class="nav-link active" href="usuarios.html">Usuarios</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="productos.html">Productos</a>
          </div>
          </li>
        </div>
         <img src="/FRONTEND/Xentronix.jpg " alt="Xentronix" style="width:50px; height:50px; margin-left:10px;">
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container py-4">
    <h1 class="mb-4" style="color: azure;">Gestión de Usuarios</h1>

    <!-- Formulario para crear usuario -->
    <div class="card mb-4">
      <div class="card-header">
        Crear Nuevo Usuario
      </div>
      <div class="card-body">
        <form id="form-crear-usuario" onsubmit="crearUsuario(); return false;">
          <div class="mb-3">
            <label for="nombre-usuario" class="form-label">Nombre de Usuario:</label>
            <input type="text" class="form-control" id="nombre-usuario" required>
          </div>
          <div class="mb-3">
            <label for="email-usuario" class="form-label">Email:</label>
            <input type="email" class="form-control" id="email-usuario" required>
          </div>
          <div class="mb-3">
            <label for="password-usuario" class="form-label">Contraseña:</label>
            <input type="password" class="form-control" id="password-usuario" required>
          </div>
          <div class="mb-3">
            <label for="rol-usuario" class="form-label">Rol:</label>
            <select id="rol-usuario" class="form-select">
              <option value="admin">Administrador</option>
              <option value="user" selected>Usuario</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Crear</button>
          <a href="panel.html" class="btn btn-secondary">Volver</a>
        </form>
      </div>
    </div>

    <!-- Tabla de usuarios -->
    <div class="card">
      <div class="card-header">
        Lista de Usuarios
      </div>
      <div class="card-body p-0">
        <table class="table table-striped mb-0" id="usuarios-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Contrasena</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usuarios-body">
            <!-- Aquí se cargarán los usuarios -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle JS (incluye Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      cargarUsuarios();
    });

    function cargarUsuarios() {
      fetch('http://127.0.0.1:5000/usuarios')
        .then(response => response.json())
        .then(data => {
          const tbody = document.getElementById('usuarios-body');
          tbody.innerHTML = '';
          data.forEach(usuario => {
            // Asumiendo que el backend retorna la información en formato de arreglo:
            // [id, nombre, email, rol] o similar.
            tbody.innerHTML += `
              <tr>
                <td>${usuario[0]}</td>
                <td>${usuario[1]}</td>
                <td>${usuario[2]}</td>
                <td>${usuario[3] || 'N/A'}</td>
                <td>
                  <button class="btn btn-sm btn-warning" onclick="editarUsuario(${usuario[0]})">Editar</button>
                  <button class="btn btn-sm btn-danger" onclick="eliminarUsuario(${usuario[0]})">Eliminar</button>
                </td>
              </tr>
            `;
          });
        })
        .catch(error => console.error('Error al cargar usuarios:', error));
    }

    function crearUsuario() {
      const nombre = document.getElementById('nombre-usuario').value;
      const email = document.getElementById('email-usuario').value;
      const password = document.getElementById('password-usuario').value;
      const rol = document.getElementById('rol-usuario').value;

      const usuario = {
        nombre: nombre,
        email: email,
        contrasena: password,
        rol: rol
      };

      fetch('http://127.0.0.1:5000/nuevo_usuario', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(usuario)
      })
      .then(response => response.json())
      .then(data => {
        Swal.fire('Usuario creado', data.mensaje, 'success');
        cargarUsuarios();
        document.getElementById('form-crear-usuario').reset();
      })
      .catch(error => console.error('Error al crear usuario:', error));
    }

    function editarUsuario(id) {
      window.location.href = `usuario-edicion.html?id=${id}`;
    }

    function eliminarUsuario(id) {
      fetch(`http://127.0.0.1:5000/eliminar_usuario/${id}`, {
        method: 'DELETE'
      })
      .then(response => response.json())
      .then(data => {
        Swal.fire('Usuario eliminado', data.mensaje, 'success');
        cargarUsuarios();
      })
      .catch(error => console.error('Error al eliminar usuario:', error));
    }
  </script>
</body>
</html>
