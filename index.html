<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Iniciar Sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Tu CSS personalizado (si lo deseas) -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/jpg" href="/FRONTEND/Xentronix.jpg">
</head>

 <div >
    <img  class="image-fondo" src="FRONTEND/X.png" alt="Fondo">
  </div>

<body class="bg-light">
<div class="container d-flex flex-column justify-content-center align-items-center vh-100">
  <div class="card shadow" style="max-width: 400px; width: 100%;">
    <div class="card-header bg-dark text-white text-center">
      <h3>Iniciar Sesión</h3>
    </div>
    <div class="card-body">
      <form id="login-form" onsubmit="loginUsuario(); return false;">
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function loginUsuario() {
    const emailValue = document.getElementById('email').value;
    const passwordValue = document.getElementById('password').value;

    const datosLogin = {
      email: emailValue,
      password: passwordValue
    };

    fetch('http://127.0.0.1:5000/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(datosLogin)
    })
    .then(response => response.json())
    .then(data => {
      // data.mensaje = "Usuario autenticado" / "Contraseña incorrecta" / "Usuario no encontrado"
      if (data.mensaje === "Login exitoso") {
        // Si es correcto, redirige al panel de control
        window.location.href = "panel.html";
      } else {
        // Muestra un error con SweetAlert2
        Swal.fire('Error', data.mensaje, 'error');
      }
    })
    .catch(error => {
      console.error('Error al iniciar sesión:', error);
      Swal.fire('Error', 'Hubo un problema con la conexión al servidor', 'error');
    });
  }
</script>
</body>
</html>
